<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Be Vietnam+Pro', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F7F7F8]">
<div class="w-full mt-[40px] md:mt-[20px]">
    <div class="max-w-[358px] mx-auto h-[41px] bg-[#FF9500] rounded-[6px] flex items-center justify-center gap-[12px]
    cursor-pointer transition-all duration-300 hover:bg-[#E68600] hover:shadow-md
    md:max-w-[1400px] md:gap-[23px]
    2xl:max-w-[1860px] 2xl: h-[55px] 2xl:rounded-[8px]">
        <p class="text-white text-[14px] leading-[1.5] font-normal
        2xl:text-[18px]">Free Courses 🌟 Sale Ends Soon, Get It Now</p>
        <img src="../../assets/icons/ic-arrow.svg" alt="Arrow Icon" class="w-[20px] h-[20px] 2xl:w-[24px] 2xl:h-[24px]">
    </div>
</div>
<header class="w-full relative">
    <div class="max-w-[358px] flex items-center justify-between mx-auto h-[73px]
    md:max-w-[1280px] md:h-[81px]
    2xl:max-w-[1596px] 2xl:h-[99px]">
        <div class="flex items-center flex-shrink-0 gap-[50px]">
            <img src="../../assets/icons/ic-logo.svg" alt="logo icon" class="w-[40px] h-[40px] md:w-[44px] md:h-[44px]
            2xl:w-[54px] 2xl:h-[54px] cursor-pointer">
            <nav>
                <ul class="hidden md:flex md:gap-[26px] md:text-[14px] 2xl:text-[18px]">
                    <li><a href="#" class="hover:text-[#FF9500]">Home</a></li>
                    <li><a href="#" class="hover:text-[#FF9500]">Courses</a></li>
                    <li><a href="#" class="hover:text-[#FF9500]">About Us</a></li>
                    <li><a href="#" class="hover:text-[#FF9500]">Pricing</a></li>
                    <li><a href="#" class="hover:text-[#FF9500]">Contact</a></li>
                </ul>
            </nav>
        </div>
        <div class="flex items-center text-[14px] font-normal leading-[1.5] gap-[20px] md:gap-[30px] 2xl:text-[18px]">
                <a href="#" class="text-[#262626] transition-colors duration-300 hover:text-[#FF9500]">Sign Up</a>
                <button class="w-[78px] h-[45px] bg-[#FF9500] text-white rounded-[6px] transition-all duration-300
                hover:bg-[#E68600] hover:shadow-md cursor-pointer
                            md:w-[86px]
                            2xl:w-[117px] 2xl:h-[55px] rounded-[8px]">Login</button>
            <div class="flex md:hidden">
                <input type="checkbox" id="menu-toggle" class="peer hidden"/>
                <label for="menu-toggle" class="cursor-pointer">
                    <img src="../../assets/icons/ic-menu.svg" alt="Menu Icon" class="w-[34px] h-[34px]">
                </label>
                <div class="fixed top-[160px] left-0 w-full bg-white transition-all duration-500 max-h-0
                            peer-checked:max-h-screen shadow-2xl overflow-hidden">
                    <nav>
                        <ul class="flex flex-col items-center gap-6 py-4">
                            <li><a href="#" class="hover:text-[#FF9500]">Home</a></li>
                            <li><a href="#" class="hover:text-[#FF9500]">Courses</a></li>
                            <li><a href="#" class="hover:text-[#FF9500]">About Us</a></li>
                            <li><a href="#" class="hover:text-[#FF9500]">Pricing</a></li>
                            <li><a href="#" class="hover:text-[#FF9500]">Contact</a></li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>
</header>
</body>
</html>
